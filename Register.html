<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="EBeauty style.css"/>
    <title>EBeauty World Website</title>
  </head>
  <body>
	<header>
	<a href="/" class="logo">
		<img src="EGoddess’ Beauty World.png" class="logo-img" alt="logo">
	</a>
	<h1>EGoddess' Beauty World</h1><br/>
	</header>
	
	<center><form>
		<div class="form-titles">
			<h2>Register</h2>
			<div class="regiscontain">
				<label for="fname"><b>First Name</b></label>
				<input type="text" placeholder="Jane" name="fname" required><br/>

				<label for="lname"><b>Last Name</b></label>
				<input type="text" placeholder="Doe" name="lname" required><br/>
				
				<label for="birthday"><b>Date of Birth</b></label>
				<input type="date" id="birthday" name="birthday" required><br/>
				
				<label for="uname"><b>Username</b></label>
				<input type="text" placeholder="Enter Username" name="uname" required><br/>
				
				<label for="email"><b>Email</b></label>
				<input type="email" placeholder="yourname@email.com" name="email" required><br/>

				<label for="psw"><b>Password</b></label>
				<input type="password" placeholder="Enter Password" name="psw" required><br/>
				
				<label for="psw2"><b>Re-enter Password</b></label>
				<input type="password" placeholder="Enter Password" name="psw2" required><br/>
				<div class="regis-btn-fix">
					<a href="EBeauty index website.html" class="enter-btn">Register</a><br/>
				</div>
				<label>
				<input type="checkbox" checked="checked" name="remember"> Remember me
				</label>
			</div>
		</div>
    </form></center>
	
	<footer>
		<p>&copy; 2026 EGoddess’ Beauty World</p>
	</footer>
  </body>
</html>
